# Build and push Docker image to GHCR when a version tag is pushed, then create
# a GitHub Release with auto-generated notes (GitHub API) and release assets.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Image name (GHCR requires lowercase)
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image reference file (release asset)
        run: |
          {
            echo "Immich Auto-Stacker — container reference"
            echo ""
            echo "Pull: ${{ steps.image.outputs.name }}:${{ github.ref_name }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo ""
            echo "OCI images are not uploaded as tarballs; use docker pull above."
          } > docker-image.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Container image (GHCR)

            The image is published to **GitHub Container Registry** for this tag (not as a single downloadable binary; use `docker pull`).

            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ```

            **Digest:** `${{ steps.build.outputs.digest }}`

            **Package:** [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/container/immich-auto-stacker)

            ---

          files: |
            docker-image.txt
            LICENSE
