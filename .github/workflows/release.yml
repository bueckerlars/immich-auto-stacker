# Build and push Docker image to GHCR when a version tag is pushed, then create
# a GitHub Release: auto-generated "what's changed" first, then container image
# details; LICENSE attached as release asset.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Image name (GHCR requires lowercase)
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitHub prepends custom `body` when using generate_release_notes; we need
      # "what's changed" first, so we fetch generated notes via API and append Docker.
      - name: Compose release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=${GITHUB_REF_NAME}" \
            --jq .body > notes.md
          {
            cat notes.md
            echo ""
            echo "## Container image (GHCR)"
            echo ""
            echo "The image is published to **GitHub Container Registry** for this tag. Use \`docker pull\` to fetch it."
            echo ""
            echo '```bash'
            echo "docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Package:** [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/container/immich-auto-stacker)"
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: LICENSE
